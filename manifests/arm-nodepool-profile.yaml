---
# NAP/Karpenter NodePool – ARM64 D-family VMs
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: arm
spec:
  weight: 10
  template:
    spec:
      nodeClassRef:
        group: karpenter.azure.com
        kind: AKSNodeClass
        name: default
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values:
            - arm64
        - key: karpenter.azure.com/sku-family
          operator: In
          values:
            - D
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - on-demand
